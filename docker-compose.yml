# docker-compose.yml — Build de PDFs via pandoc/extra (XeLaTeX incluso)
#
# Uso:
#   docker compose run --rm claro       # gera dist/queima-<commit>-claro.pdf
#   docker compose run --rm escuro      # gera dist/queima-<commit>-escuro.pdf
#   docker compose run --rm impressao   # gera dist/queima-<commit>-impressao.pdf
#   docker compose run --rm terminal    # gera dist/queima-<commit>-terminal.pdf
#   docker compose run --rm resumo      # gera dist/queima-<commit>-resumo.pdf
#   docker compose up                   # gera todos os temas em paralelo
#
# Primeiro build (necessário uma vez para instalar Chromium + mmdc):
#   docker compose build

services:
  claro:
    build: .
    volumes:
      - .:/data
    working_dir: /data
    environment:
      - COMMIT=${COMMIT:-local}
    entrypoint:
      - /bin/sh
      - -c
      - |-
        mkdir -p dist
        pandoc capitulos/*.md \
          --metadata-file=metadata.yaml \
          --metadata-file=temas/claro.yaml \
          --template=temas/template.tex \
          --lua-filter=temas/mermaid.lua \
          --lua-filter=temas/callouts.lua \
          --lua-filter=temas/refs.lua \
          --lua-filter=temas/divider.lua \
          --pdf-engine=lualatex \
          --toc \
          -o dist/queima-${COMMIT}-claro.pdf
        echo "Gerado: dist/queima-${COMMIT}-claro.pdf"

